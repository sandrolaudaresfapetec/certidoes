app = 'certidoes'
primary_region = 'gru'

[build]

[env]
  NODE_ENV = 'production'
  DATABASE_URL = 'file:/data/certidoes.db'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1

[mounts]
  source = 'certidoes_data'
  destination = '/data'
